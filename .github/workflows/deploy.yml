name: CI/CD — QuickFood

on:
  push:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/quickfood

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push core-service
        uses: docker/build-push-action@v5
        with:
          context: ./BACKEND/core-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-core-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push delivery-service
        uses: docker/build-push-action@v5
        with:
          context: ./BACKEND/delivery-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-delivery-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./BACKEND/eureka-server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-eureka-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./BACKEND/api-gateway
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./quickfood-fe
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/quickfood

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Pulling new Docker images..."
            docker compose -f docker-compose.prod.yml pull

            echo "==> Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy successful!"
            docker compose -f docker-compose.prod.yml ps
