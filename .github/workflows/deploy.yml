name: CI/CD Pipeline — QuickFood

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/quickfood

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push all images
        run: |
          docker build -t $IMAGE_PREFIX-core-service:latest ./BACKEND/core-service
          docker build -t $IMAGE_PREFIX-delivery-service:latest ./BACKEND/delivery-service
          docker build -t $IMAGE_PREFIX-eureka-server:latest ./BACKEND/eureka-server
          docker build -t $IMAGE_PREFIX-api-gateway:latest ./BACKEND/api-gateway
          docker build -t $IMAGE_PREFIX-frontend:latest ./quickfood-fe
          
          docker push $IMAGE_PREFIX-core-service:latest
          docker push $IMAGE_PREFIX-delivery-service:latest
          docker push $IMAGE_PREFIX-eureka-server:latest
          docker push $IMAGE_PREFIX-api-gateway:latest
          docker push $IMAGE_PREFIX-frontend:latest

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/quickfood
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
