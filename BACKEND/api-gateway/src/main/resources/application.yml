server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        # === 1. Core Service Route ===
        - id: core-service
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/core/**
          filters:
            - StripPrefix=0
            - Authentication

        # === 2. Delivery Service Route ===
        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=0
            - Authentication

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

