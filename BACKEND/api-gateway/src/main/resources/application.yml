server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        # === 1. Core Service Route ===
        - id: core-service
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/core/**
          filters:
            - StripPrefix=0
            - Authentication

        # === 2. Delivery Service Route ===
        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=0
            - Authentication

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "https://*.vercel.app"
              - "http://localhost:3000"
              - "http://165.227.147.13:3000"
              # ✅ Thêm VNPay origin nếu cần (thường không cần vì VNPay redirect)
              - "https://sandbox.vnpayment.vn"
            allowed-methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "PATCH"
              - "OPTIONS"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

