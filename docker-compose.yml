version: '3.8'

services:
  # ============================================
  # DATABASE SERVICE (POSTGRESQL + POSTGIS)
  # ============================================
  postgres-db:
    image: postgis/postgis:16-3.4
    container_name: quickfood-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - quickfood-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  discovery-service:
    build: ./BACKEND/eureka-server/
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - quickfood-network

  api-gateway:
    build: ./BACKEND/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    networks:
      - quickfood-network

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  core-service:
    build: ./BACKEND/core-service
    container_name: core-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/quickfood_core
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - quickfood-network

  delivery-service:
    build: ./BACKEND/delivery-service
    container_name: delivery-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/quickfood_delivery
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - quickfood-network

networks:
  quickfood-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
