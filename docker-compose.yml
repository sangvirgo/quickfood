version: '3.8'

services:
  # ============================================
  # DATABASE SERVICE (POSTGRESQL + POSTGIS)
  # ============================================
  postgres-db:
    image: postgis/postgis:16-3.4
    container_name: quickfood-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quickfood-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  discovery-service:
    build: ./BACKEND/eureka-server/
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - quickfood-network

  config-server:
    build: ./BACKEND/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service
    networks:
      - quickfood-network

  api-gateway:
    build: ./BACKEND/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - config-server
    networks:
      - quickfood-network

networks:
  quickfood-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
